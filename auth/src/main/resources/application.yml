server:
  port: 8086

spring:
  application:
    name: auth
  # .env.auth 파일에서 상세 값을 읽어오도록 설정
  config:
    import: "optional:file:.env.auth[.properties]"

  output:
    ansi:
      enabled: always

  # Redis 설정 (토큰 저장 및 로그인 제한용)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  # OAuth2 클라이언트 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: http://localhost:8086/login/oauth2/code/google
            scope: profile,email
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
      frontendUrl: ${FRONTEND_URL:http://localhost:5173}

# JWT 설정
mossy:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire-ms: 1800000    # 30분
    refresh-token-expire-ms: 1209600000    # 14일

# OpenFeign 설정 (로깅 및 타임아웃)
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# 로깅 설정 (Feign 통신 확인용)
logging:
  level:
    com.mossy.boundedContext.auth.out.MemberServiceClient: DEBUG