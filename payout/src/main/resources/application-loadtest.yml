spring:
  config:
    activate:
      on-profile: loadtest

  datasource:
    url: jdbc:postgresql://localhost:5433/mossy
    username: postgres
    password: mossyProject123@
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false   # KafkaListener 자동 시작 안 함 (부하테스트 불필요)

  batch:
    jdbc:
      initialize-schema: always
      isolation-level-for-create: READ_COMMITTED

  cache:
    type: none              # Redis 캐시 비활성화

  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.mossy.payout: DEBUG
