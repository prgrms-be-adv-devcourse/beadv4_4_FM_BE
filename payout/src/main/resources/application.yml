server:
  port: 8084
spring:
  application:
    name: payout
  config:
    import: "optional:file:payout/.env.payout[.properties]"
  output:
    ansi:
      enabled: always
  jackson:
    serialization:
      fail-on-empty-beans: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mossy}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:mossyProject123@}
    driver-class-name: org.postgresql.Driver
#   #로컬환경
#    datasource:
#      url: jdbc:postgresql://${localhost}:${5432}/${mossy}
#      username: ${postgres}
#      password: ${mossyProject123@}
#      driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_batch_fetch_size: 100
  batch:
    job:
      enabled: false
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payout

# 모든 서비스에서 동일한 경로로 스웨거 사용
springdoc:
  swagger-ui:
    path: /mossy-docs
  api-docs:
    path: /v3/api-docs
