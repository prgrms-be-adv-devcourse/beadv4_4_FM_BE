services:
  cash:
    build:
      context: ..
      dockerfile: cash/Dockerfile
    container_name: cash
    restart: always
    ports:
      - "8083:8080"
    env_file:
      - .env.cash
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mossy-network

networks:
  mossy-network:
    external: true