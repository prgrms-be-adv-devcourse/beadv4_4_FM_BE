apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: backend
type: Opaque
stringData:
  # Database
  DB_URL: "${DB_URL}"
  DB_USERNAME: "${DB_USERNAME}"
  DB_PASSWORD: "${DB_PASSWORD}"

  # JWT
  JWT_SECRET: "${JWT_SECRET}"

  # AWS S3
  CLOUD_AWS_ACCESS_KEY: "${CLOUD_AWS_ACCESS_KEY}"
  CLOUD_AWS_SECRET_KEY: "${CLOUD_AWS_SECRET_KEY}"
  CLOUD_AWS_REGION: "${CLOUD_AWS_REGION}"
  CLOUD_AWS_S3_BUCKET: "${CLOUD_AWS_S3_BUCKET}"

  # 결제 연동 (Toss 등)
  TOSS_SECRET_KEY: "${TOSS_SECRET_KEY}"

  # OAuth2 (로그인 시)
  OAUTH_GOOGLE_CLIENT_ID: "${OAUTH_GOOGLE_CLIENT_ID}"
  OAUTH_GOOGLE_CLIENT_SECRET: "${OAUTH_GOOGLE_CLIENT_SECRET}"
  KAKAO_CLIENT_ID: "${KAKAO_CLIENT_ID}"
  KAKAO_CLIENT_SECRET: "${KAKAO_CLIENT_SECRET}"

  AUTH_REFRESH_TOKEN_PEPPER: "${AUTH_REFRESH_TOKEN_PEPPER}"

  SPRING_DATA_REDIS_HOST: "${REDIS_HOST}"
  SPRING_DATA_REDIS_PORT: "6379"
  ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"