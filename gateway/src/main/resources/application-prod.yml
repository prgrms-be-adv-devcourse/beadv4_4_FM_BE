server:
  port: 8080

spring:
  application:
    name: gateway

  config:
    import: "optional:file:./gateway/.env.gateway[.properties]"
    activate:
      on-profile: prod

  cloud:
    gateway:
      routes:
        # ── Market ──
        - id: market
          uri: http://market:8081
          predicates:
            - Path=/api/v1/carts/**, /api/v1/orders/**, /api/v1/payments/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Member (공개) ──
        - id: member-public
          uri: http://member:8082
          predicates:
            - Path=/api/v1/users/signup

        # ── Member (인증 필요) ──
        - id: member-private
          uri: http://member:8082
          predicates:
            - Path=/api/v1/users/me, /api/v1/users/profile, /api/v1/users/password, /api/v1/users/address, /api/v1/users/phone, /api/v1/users/set-password, /api/v1/users/nickname
          filters:
            - name: JwtAuthenticationFilter

        # ── Seller 신청 (인증 필요) ──
        - id: seller-request
          uri: http://member:8082
          predicates:
            - Path=/api/v1/users/seller-request
          filters:
            - name: JwtAuthenticationFilter

        # ── Admin 판매자 관리 (인증 필요) ──
        - id: admin-seller
          uri: http://member:8082
          predicates:
            - Path=/api/v1/admin/seller-requests/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Cash ──
        - id: cash
          uri: http://cash:8083
          predicates:
            - Path=/api/v1/cash/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Payout ──
        - id: payout
          uri: http://payout:8084
          predicates:
            - Path=/api/payout/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Review ──
        - id: review
          uri: http://review:8085
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Auth (공개 - 로그인/토큰/OAuth2) ──
        - id: auth
          uri: http://auth:8086
          predicates:
            - Path=/api/v1/auth/**

        # ── Auth OAuth2 ──
        - id: auth-oauth2
          uri: http://auth:8086
          predicates:
            - Path=/oauth2/**, /login/oauth2/**

        # ── Product ──
        - id: product-public
          uri: http://product:8090
          predicates:
            - Path=/api/v1/products/search/**, /api/v1/products/{catalogProductId}
            - Method=GET

        - id: product-private
          uri: http://product:8090
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtAuthenticationFilter

eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET}