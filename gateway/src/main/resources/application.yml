server:
  port: 8080 # 외부에서 접근하는 포트

spring:
  application:
    name: gateway

  config:
    import: "optional:file:.env.gateway[.properties]"

  cloud:
    gateway:
      routes:
        - id: market
          uri: http://market:8081 # Docker Compose 서비스 이름 또는 주소
          predicates:
            - "Path=/api/v1/cart/**, /api/v1/orders/**, /api/v1/payments/**, /api/v1/product/**"
          filters:
            - JwtAuthenticationFilter

        # 로그인 회원가입은 필터 X
        - id: member
          uri: http://member:8082
          predicates:
            - "Path=/api/v1/admin/**, /api/v1/users/**"

        - id: cash
          uri: http://cash:8083
          predicates:
            - "Path=/api/v1/cash/**"
          filters:
            - JwtAuthenticationFilter

        - id: payout
          uri: http://payout:8084
          predicates:
            - "Path=/api/payout/**"
          filters:
            - JwtAuthenticationFilter

        - id: review
          uri: http://review:8085
          predicates:
            - "Path=/api/v1/review/**"
          filters:
            - JwtAuthenticationFilter

        - id: auth
          uri: http://localhost:8086
          predicates:
            - "Path=/api/v1/auth/**"

# 유레카 클라이언트 비활성화 (나중에 활성화)
eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET}