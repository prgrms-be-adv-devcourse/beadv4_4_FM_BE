server:
  port: 8089
  forward-headers-strategy: framework

spring:
  application:
    name: gateway

  config:
    import: "optional:file:./gateway/.env.gateway[.properties]"

  cloud:
    gateway:
      routes:
        # ── Market ──
        - id: market
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/api/v1/carts/**, /api/v1/orders/**, /api/v1/coupons/**, /api/v1/seller/orders**, /api/v1/wishlist/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Member (공개) ──
        - id: member-public
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/v1/users/signup
          filters:
            - name: StripInternalHeadersFilter

        # ── Member (인증 필요) ──
        - id: member-private
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/v1/users/me, /api/v1/users/profile, /api/v1/users/password, /api/v1/users/address, /api/v1/users/phone, /api/v1/users/set-password, /api/v1/users/nickname, /api/v1/users/profile-image
          filters:
            - name: JwtAuthenticationFilter

        # ── Seller 신청 (인증 필요) ──
        - id: seller-request
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/v1/users/seller-request
          filters:
            - name: JwtAuthenticationFilter

        # ── Admin 판매자 관리 (인증 필요) ──
        - id: admin-seller
          uri: http://127.0.0.1:8082
          predicates:
            - Path=/api/v1/admin/seller-requests/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Cash ──
        - id: cash
          uri: http://127.0.0.1:8083
          predicates:
            - Path=/api/v1/cash/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Payout ──
        - id: payout
          uri: http://127.0.0.1:8084
          predicates:
            - Path=/api/payout/**, /api/v1/donations/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Review ──
        - id: review
          uri: http://127.0.0.1:8085
          predicates:
            - Path=/api/v1/reviews/**
          filters:
            - name: JwtAuthenticationFilter

        # ── Auth (공개 - 로그인/토큰/OAuth2) ──
        - id: auth
          uri: http://127.0.0.1:8086
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: StripInternalHeadersFilter

        # ── Auth OAuth2 ──
        - id: auth-oauth2
          uri: http://127.0.0.1:8086
          predicates:
            - Path=/oauth2/**, /login/oauth2/**
          filters:
            - name: StripInternalHeadersFilter

        # ── Product ──
        - id: product-public
          uri: http://127.0.0.1:8090
          predicates:
            - Path=/api/v1/products/search/**, /api/v1/products/{catalogProductId}
            - Method=GET
          filters:
            - name: OptionalJwtAuthenticationFilter

        - id: product-private
          uri: http://127.0.0.1:8090
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: JwtAuthenticationFilter

        # ── AI Recommendation (공개 + 인증) ──
        - id: ai-recommendation-personal
          uri: http://127.0.0.1:8087
          predicates:
            - Path=/api/v1/recommendations/personal
          filters:
            - name: JwtAuthenticationFilter

        - id: ai-recommendation-public
          uri: http://127.0.0.1:8087
          predicates:
            - Path=/api/v1/recommendations/**
  data:
    redis:
      host: redis
      port: 6379

jwt:
  secret: ${JWT_SECRET}