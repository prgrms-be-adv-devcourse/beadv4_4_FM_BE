services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: gateway
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.gateway
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - mossy-network

networks:
  mossy-network:
    external: true